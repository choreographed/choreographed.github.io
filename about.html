<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTERNET MONARCH - ABOUT APE</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #F5F0E8;
            color: #4A4035;
            font-family: 'Courier New', monospace;
            line-height: 1.4;
            cursor: default;
            text-shadow: none;
            overflow-y: auto;
            font-size: 16px;
        }
        
        /* Mobile adjustments */
        @media (max-width: 768px) {
            html, body {
                font-size: 14px;
                line-height: 1.5;
            }
        }
        
        @media (max-width: 480px) {
            html, body {
                font-size: 12px;
                line-height: 1.6;
            }
        }
        
        .header {
            padding: 20px;
            border-bottom: 1px solid #C8BFA8;
            margin-bottom: 20px;
            background-color: rgba(245, 240, 232, 0.95);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        @media (max-width: 768px) {
            .header {
                padding: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .header {
                padding: 10px;
            }
        }
        
        .title {
            color: #2C2420;
            font-size: 2.5rem;
            margin: 0;
            text-shadow: none;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 2rem;
            }
        }
        
        @media (max-width: 480px) {
            .title {
                font-size: 1.5rem;
            }
        }
        
        .content-container {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        @media (max-width: 768px) {
            .content-container {
                padding: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .content-container {
                padding: 10px;
            }
        }
        
        .ape-fact {
            margin-bottom: 25px;
            border-left: 3px solid #4A6B4A;
            padding-left: 15px;
            animation: glitch 2s infinite alternate;
            white-space: pre-line;
        }
        
        @media (max-width: 480px) {
            .ape-fact {
                margin-bottom: 20px;
                padding-left: 10px;
            }
        }
        
        @keyframes glitch {
            0% { text-shadow: none; }
            20% { text-shadow: none; }
            100% { text-shadow: none; }
        }
        
        .ape-image {
            max-width: 100%;
            height: auto;
            border: 1px solid #4A6B4A;
            margin: 20px 0;
            box-shadow: none;
            filter: sepia(20%);
            display: block;
        }
        
        @media (max-width: 768px) {
            .ape-image {
                margin: 15px 0;
            }
        }
        
        @media (max-width: 480px) {
            .ape-image {
                margin: 10px 0;
            }
        }
        
        .home-button {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #7A6E62;
            text-decoration: none;
            font-size: 1rem;
            opacity: 0.8;
            transition: all 0.3s;
        }
        
        @media (max-width: 768px) {
            .home-button {
                position: static;
                display: block;
                margin-top: 10px;
            }
        }
        
        @media (max-width: 480px) {
            .home-button {
                font-size: 0.9rem;
            }
        }
        
        .home-button:hover {
            opacity: 1;
            text-shadow: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">ABOUT APE</h1>
        <a href="index.html" class="home-button">[HOME]</a>
    </div>

    <div class="content-container">

        <img src="./media/images/Flowers.JPG" class="ape-image" alt="Ape" onerror="this.style.display='none'">


        <div class="ape-fact">
> NAME: Ape
> AGE: 21
> REGION: Europe
        </div>

        <div class="ape-fact">
> PRIMARY: 
> - Learning -> UNIX Philospohy
> - Current TV Series > The Office US edition
        </div>

        <div class="ape-fact">
> SECONDARY:
> [✓] Art and Data collections
> [✓] Exploring friendships
> [✓] God over all
        </div>

        <div class="ape-fact">
> CONTACT:
> Signal - Ape.69
> 
        </div>
    </div>

    <script>
        const facts = document.querySelectorAll('.ape-fact');
        facts.forEach((fact, index) => {
            fact.style.opacity = 0;
            setTimeout(() => {
                fact.style.transition = "opacity 1.5s";
                fact.style.opacity = 1;
            }, 200 + (index * 100));
        });
    </script>
</body>
</html>
